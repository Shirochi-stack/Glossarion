name: Build Android APK

on:
  workflow_dispatch:  # Manual trigger
  push:
    tags:
      - 'v*'  # Also trigger on version tags

jobs:
  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            automake \
            libltdl-dev \
            zip \
            unzip \
            openjdk-17-jdk
      
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 "cython<3" virtualenv
      
      - name: Restore Buildozer cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.buildozer
            src/android/.buildozer
          key: buildozer-v5-${{ runner.os }}-${{ hashFiles('src/android/buildozer.spec', '.github/workflows/build-android.yml') }}
          restore-keys: |
            buildozer-v5-${{ runner.os }}-
      
      - name: Fix stale pyjnius cache
        run: |
          # If cached pyjnius exists but jnius.c is missing, delete it to force Cython rebuild
          for d in $(find "$HOME/.buildozer" src/android/.buildozer -path '*/pyjnius/jnius' -type d 2>/dev/null); do
            if [ ! -f "$d/jnius.c" ]; then
              echo "Removing stale pyjnius build: $(dirname $d)"
              rm -rf "$(dirname $d)"
            fi
          done
      
      - name: Copy shared backend files
        run: |
          # Copy necessary shared Python modules from src/ into the android build directory
          # These are the translation engine files needed at runtime
          ANDROID_DIR="src/android"
          SRC_DIR="src"
          
          # Create a _backend directory for shared modules
          mkdir -p "$ANDROID_DIR/_backend"
          
          # Core translation engine
          cp "$SRC_DIR/TransateKRtoEN.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/unified_api_client.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/multi_api_key_manager.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/GlossaryManager.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/chapter_splitter.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/history_manager.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/txt_processor.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/api_key_encryption.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/large_env.py" "$ANDROID_DIR/_backend/" 2>/dev/null || true
          cp "$SRC_DIR/model_options.py" "$ANDROID_DIR/_backend/" 2>/dev/null || true
          cp "$SRC_DIR/android/reader_translator.py" "$ANDROID_DIR/_backend/" 2>/dev/null || true
          
          # Generate stub modules for packages not available on Android
          cd "$ANDROID_DIR" && python3 generate_stubs.py && cd -
          
          # Copy assets
          mkdir -p "$ANDROID_DIR/assets"
          cp "$SRC_DIR/Halgakos.png" "$ANDROID_DIR/assets/" 2>/dev/null || true
          cp "$SRC_DIR/Halgakos.ico" "$ANDROID_DIR/assets/" 2>/dev/null || true
      
      - name: Install Gradle init script to fix Kotlin stdlib conflict
        run: |
          # Use a Gradle init script to globally exclude kotlin-stdlib-jdk7/jdk8.
          # Init scripts in ~/.gradle/init.d/ are applied to EVERY Gradle build,
          # regardless of what build.gradle files p4a generates or copies.
          # This is the only reliable way since p4a overwrites dist build.gradle
          # files during its internal copy chain.
          mkdir -p ~/.gradle/init.d
          printf 'allprojects {\n    configurations.all {\n        exclude group: '"'"'org.jetbrains.kotlin'"'"', module: '"'"'kotlin-stdlib-jdk7'"'"'\n        exclude group: '"'"'org.jetbrains.kotlin'"'"', module: '"'"'kotlin-stdlib-jdk8'"'"'\n    }\n}\n' > ~/.gradle/init.d/fix-kotlin-stdlib.gradle
          echo "✅ Installed Gradle init script at ~/.gradle/init.d/fix-kotlin-stdlib.gradle"
          cat ~/.gradle/init.d/fix-kotlin-stdlib.gradle


      - name: Build debug APK
        working-directory: src/android
        run: |
          # Set JAVA_HOME for Buildozer
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          
          # Unset system NDK env vars — buildozer must use its own NDK (r25b)
          # The system NDK r27 has ALooper_pollAll marked unavailable, breaking SDL2
          unset ANDROID_NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_LATEST_HOME
          
          # Add _backend to PYTHONPATH so modules can be found
          export PYTHONPATH="$(pwd)/_backend:$PYTHONPATH"
          
          # Clean the bin directory to force a fresh APK packaging
          rm -rf bin/
          
          # Build — capture exit code properly (tee resets $?)
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
          BUILD_EXIT=$?
          echo "=== Build exit code: $BUILD_EXIT ==="
          
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "❌ Buildozer failed! Last 200 lines of log:"
            tail -200 build.log
            exit $BUILD_EXIT
          fi
      
      - name: Find APK
        id: find_apk
        run: |
          echo "=== Searching for APK files ==="
          # Search everywhere under src/android for .apk files
          echo "--- Recursive search under src/android ---"
          find src/android -name '*.apk' -type f 2>/dev/null || echo "No APK files found under src/android"
          
          # Also check .buildozer output paths
          echo "--- Checking .buildozer paths ---"
          find src/android/.buildozer -name '*.apk' -type f 2>/dev/null || echo "No APK in .buildozer"
          
          # List the bin directory if it exists
          echo "--- Listing src/android/bin/ ---"
          ls -la src/android/bin/ 2>/dev/null || echo "bin/ directory does not exist"
          
          # Find the APK anywhere
          APK_PATH=$(find src/android -name '*.apk' -type f | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "apk_found=true" >> $GITHUB_OUTPUT
            echo "✅ Found APK: $APK_PATH"
            # Copy to a known location for upload (skip if already there)
            mkdir -p src/android/bin
            cp -n "$APK_PATH" src/android/bin/ 2>/dev/null || true
          else
            echo "apk_found=false" >> $GITHUB_OUTPUT
            echo "❌ No APK found anywhere!"
            # Show last 200 lines of build log for clues
            echo "=== Last 200 lines of build.log ==="
            tail -200 src/android/build.log 2>/dev/null || true
          fi
      
      - name: Upload APK artifact
        if: steps.find_apk.outputs.apk_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Glossarion-Android-APK
          path: src/android/bin/*.apk
          if-no-files-found: warn
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: src/android/build.log

      # ── Emulator smoke test: install APK, launch, capture crash log ──
      - name: Enable KVM for emulator
        if: steps.find_apk.outputs.apk_found == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run emulator smoke test
        if: steps.find_apk.outputs.apk_found == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_5
          ram-size: 2048M
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set +e
            echo "=== Finding APK ==="
            APK_PATH=$(find $GITHUB_WORKSPACE/src/android/bin -name '*.apk' -type f 2>/dev/null | head -1)
            echo "APK_PATH=$APK_PATH"
            ls -la $GITHUB_WORKSPACE/src/android/bin/ 2>/dev/null || echo "bin/ not found"
            test -n "$APK_PATH" || { echo "No APK found, skipping"; exit 0; }
            echo "=== Installing APK ==="
            INSTALL_OK=false
            if adb install --no-streaming "$APK_PATH" 2>&1; then
              INSTALL_OK=true
            elif adb install "$APK_PATH" 2>&1; then
              INSTALL_OK=true
            else
              echo "⚠️ APK install failed — likely ABI mismatch (APK is ARM, emulator is x86_64)"
              echo "   This is expected; the smoke test only validates installability on matching hardware."
            fi
            if [ "$INSTALL_OK" = "true" ]; then
              echo "=== Clearing logcat ==="
              adb logcat -c
              echo "=== Launching app ==="
              adb shell am start -n com.glossarion.glossarion/org.kivy.android.PythonActivity
              echo "=== Waiting 30s for app to start or crash ==="
              sleep 30
              echo "=== Dumping logcat ==="
              adb logcat -d > $GITHUB_WORKSPACE/emulator-logcat-full.log 2>&1
              grep -iE '(python|kivy|glossarion|SDL|Traceback|ModuleNotFound|ImportError|FATAL|AndroidRuntime)' $GITHUB_WORKSPACE/emulator-logcat-full.log > $GITHUB_WORKSPACE/emulator-logcat-filtered.log 2>/dev/null || true
              echo "=== Filtered logcat (last 300 lines) ==="
              tail -300 $GITHUB_WORKSPACE/emulator-logcat-filtered.log
              echo "=== Process check ==="
              adb shell pidof com.glossarion.glossarion && echo "App is running" || echo "App NOT running (crashed)"
            else
              echo "=== Skipping launch/logcat (install failed) ==="
            fi
            exit 0

      - name: Upload emulator logcat
        if: always() && steps.find_apk.outputs.apk_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: emulator-crash-log
          path: |
            emulator-logcat-full.log
            emulator-logcat-filtered.log
          if-no-files-found: ignore
      
      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/') && steps.find_apk.outputs.apk_found == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: src/android/bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Buildozer cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.buildozer
            src/android/.buildozer
          key: buildozer-v5-${{ runner.os }}-${{ hashFiles('src/android/buildozer.spec', '.github/workflows/build-android.yml') }}

