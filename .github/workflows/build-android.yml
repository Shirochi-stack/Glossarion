name: Build Android APK

on:
  workflow_dispatch:  # Manual trigger
  push:
    tags:
      - 'v*'  # Also trigger on version tags

jobs:
  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            automake \
            libltdl-dev \
            zip \
            unzip \
            openjdk-17-jdk
      
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 "cython<3" virtualenv
      
      - name: Restore Buildozer cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.buildozer
            src/android/.buildozer
          key: buildozer-v5-${{ runner.os }}-${{ hashFiles('src/android/buildozer.spec', '.github/workflows/build-android.yml') }}
          restore-keys: |
            buildozer-v5-${{ runner.os }}-
      
      - name: Fix stale pyjnius cache
        run: |
          # If cached pyjnius exists but jnius.c is missing, delete it to force Cython rebuild
          for d in $(find "$HOME/.buildozer" src/android/.buildozer -path '*/pyjnius/jnius' -type d 2>/dev/null); do
            if [ ! -f "$d/jnius.c" ]; then
              echo "Removing stale pyjnius build: $(dirname $d)"
              rm -rf "$(dirname $d)"
            fi
          done
      
      - name: Copy shared backend files
        run: |
          # Copy necessary shared Python modules from src/ into the android build directory
          # These are the translation engine files needed at runtime
          ANDROID_DIR="src/android"
          SRC_DIR="src"
          
          # Create a _backend directory for shared modules
          mkdir -p "$ANDROID_DIR/_backend"
          
          # Core translation engine
          cp "$SRC_DIR/TransateKRtoEN.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/unified_api_client.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/multi_api_key_manager.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/GlossaryManager.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/chapter_splitter.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/history_manager.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/txt_processor.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/api_key_encryption.py" "$ANDROID_DIR/_backend/"
          cp "$SRC_DIR/large_env.py" "$ANDROID_DIR/_backend/" 2>/dev/null || true
          cp "$SRC_DIR/model_options.py" "$ANDROID_DIR/_backend/" 2>/dev/null || true
          cp "$SRC_DIR/android/reader_translator.py" "$ANDROID_DIR/_backend/" 2>/dev/null || true
          
          # Stubs for modules not available on Android
          cat > "$ANDROID_DIR/_backend/image_translator.py" << 'EOF'
          class ImageTranslator:
              """Stub — image translation not supported on Android."""
              pass
          EOF
          
          cat > "$ANDROID_DIR/_backend/ai_hunter_enhanced.py" << 'EOF'
          class ImprovedAIHunterDetection:
              """Stub — AI hunter not available on Android."""
              pass
          EOF
          
          cat > "$ANDROID_DIR/_backend/pdf_extractor.py" << 'EOF'
          def extract_text_from_pdf(*args, **kwargs): return ""
          def extract_pdf_with_formatting(*args, **kwargs): return "", {}
          def generate_css_from_pdf(*args, **kwargs): return ""
          def create_pdf_from_html(*args, **kwargs): return False
          def create_pdf_from_text(*args, **kwargs): return False
          EOF
          
          # Create __init__.py
          touch "$ANDROID_DIR/_backend/__init__.py"
          
          # Copy assets
          mkdir -p "$ANDROID_DIR/assets"
          cp "$SRC_DIR/Halgakos.png" "$ANDROID_DIR/assets/" 2>/dev/null || true
          cp "$SRC_DIR/Halgakos.ico" "$ANDROID_DIR/assets/" 2>/dev/null || true
          
          # Stubs for packages removed from buildozer requirements
          # These allow backend code to import without crashing on Android
          cat > "$ANDROID_DIR/_backend/httpx_stub.py" << 'STUBEOF'
          """Stub — httpx not available on Android, use requests instead."""
          class Client:
              def __init__(self, *a, **kw): pass
              def get(self, *a, **kw): raise NotImplementedError("httpx unavailable")
              def post(self, *a, **kw): raise NotImplementedError("httpx unavailable")
          class AsyncClient(Client): pass
          STUBEOF
          
          cat > "$ANDROID_DIR/_backend/rapidfuzz_stub.py" << 'STUBEOF'
          """Stub — rapidfuzz not available on Android, falls back to difflib."""
          import difflib
          class fuzz:
              @staticmethod
              def ratio(s1, s2): return int(difflib.SequenceMatcher(None, s1, s2).ratio() * 100)
              @staticmethod
              def partial_ratio(s1, s2): return int(difflib.SequenceMatcher(None, s1, s2).ratio() * 100)
          class process:
              @staticmethod
              def extractOne(query, choices, **kw):
                  best = max(choices, key=lambda c: difflib.SequenceMatcher(None, query, c).ratio())
                  score = int(difflib.SequenceMatcher(None, query, best).ratio() * 100)
                  return (best, score, 0) if score > kw.get('score_cutoff', 0) else None
          STUBEOF
          
          cat > "$ANDROID_DIR/_backend/langdetect_stub.py" << 'STUBEOF'
          """Stub — langdetect not available on Android."""
          def detect(text): return "unknown"
          def detect_langs(text): return []
          STUBEOF
          
          # ebooklib stub — must work for both `import ebooklib` and `from ebooklib import epub`
          cat > "$ANDROID_DIR/_backend/ebooklib_stub.py" << 'STUBEOF'
          """Stub — ebooklib not available on Android."""
          ITEM_DOCUMENT = 9
          ITEM_STYLE = 3
          ITEM_IMAGE = 6
          ITEM_NAVIGATION = 1
          ITEM_COVER = 2
          class EpubBook: pass
          class EpubHtml: pass
          class EpubItem: pass
          def read_epub(*a, **kw): raise NotImplementedError("ebooklib unavailable on Android")
          def write_epub(*a, **kw): raise NotImplementedError("ebooklib unavailable on Android")
          # Sub-module alias so `from ebooklib import epub` works
          import sys as _sys
          _self = _sys.modules[__name__]
          class _EpubModule:
              ITEM_DOCUMENT = 9
              ITEM_STYLE = 3
              ITEM_IMAGE = 6
              ITEM_NAVIGATION = 1
              ITEM_COVER = 2
              EpubBook = EpubBook
              EpubHtml = EpubHtml
              EpubItem = EpubItem
              read_epub = staticmethod(read_epub)
              write_epub = staticmethod(write_epub)
          epub = _EpubModule()
          STUBEOF
          
          # tiktoken stub — TransateKRtoEN imports it at module level
          cat > "$ANDROID_DIR/_backend/tiktoken_stub.py" << 'STUBEOF'
          """Stub — tiktoken not available on Android."""
          class _DummyEncoding:
              def encode(self, text, *a, **kw): return list(range(len(text) // 4))
              def decode(self, tokens, *a, **kw): return ""
          def encoding_for_model(model_name, **kw): return _DummyEncoding()
          def get_encoding(name): return _DummyEncoding()
          STUBEOF
          
          # Create sitecustomize.py to register stubs as real module names
          cat > "$ANDROID_DIR/_backend/sitecustomize.py" << 'STUBEOF'
          import importlib, sys
          _stub_map = {
              'httpx': 'httpx_stub',
              'rapidfuzz': 'rapidfuzz_stub',
              'rapidfuzz.fuzz': 'rapidfuzz_stub',
              'rapidfuzz.process': 'rapidfuzz_stub',
              'langdetect': 'langdetect_stub',
              'ebooklib': 'ebooklib_stub',
              'ebooklib.epub': 'ebooklib_stub',
              'tiktoken': 'tiktoken_stub',
          }
          for mod_name, stub_name in _stub_map.items():
              if mod_name not in sys.modules:
                  try:
                      importlib.import_module(mod_name)
                  except ImportError:
                      try:
                          stub = importlib.import_module(stub_name)
                          sys.modules[mod_name] = stub
                      except Exception:
                          pass
          STUBEOF
      
      - name: Patch p4a build.gradle to fix Kotlin stdlib conflict
        run: |
          # Buildozer v1.5.0 git-clones p4a into .buildozer/android/platform/python-for-android
          # and uses THAT copy (not the pip-installed package). We must patch its build.gradle
          # template to exclude kotlin-stdlib-jdk7/jdk8 (merged into stdlib since 1.8+).
          PATCH_BLOCK=$(printf '\n// --- Kotlin stdlib duplicate class fix (injected by CI) ---\nconfigurations.all {\n    exclude group: '"'"'org.jetbrains.kotlin'"'"', module: '"'"'kotlin-stdlib-jdk7'"'"'\n    exclude group: '"'"'org.jetbrains.kotlin'"'"', module: '"'"'kotlin-stdlib-jdk8'"'"'\n}\n')

          PATCHED=0

          # 1. Patch the git-cloned p4a SDL2 bootstrap template
          P4A_TMPL="src/android/.buildozer/android/platform/python-for-android/pythonforandroid/bootstraps/sdl2/build/build.gradle"
          if [ -f "$P4A_TMPL" ] && ! grep -q 'kotlin-stdlib-jdk7' "$P4A_TMPL"; then
            echo "$PATCH_BLOCK" >> "$P4A_TMPL"
            echo "✅ Patched git-cloned p4a template: $P4A_TMPL"
            PATCHED=$((PATCHED+1))
          elif [ -f "$P4A_TMPL" ]; then
            echo "ℹ️  p4a template already patched"
          else
            echo "⚠️  p4a template not found at: $P4A_TMPL"
          fi

          # 2. Patch all generated dist build.gradle files (from cache)
          for bg in $(find src/android/.buildozer -path '*/dists/*/build.gradle' -type f 2>/dev/null); do
            if ! grep -q 'kotlin-stdlib-jdk7' "$bg"; then
              echo "$PATCH_BLOCK" >> "$bg"
              echo "✅ Patched dist build.gradle: $bg"
              PATCHED=$((PATCHED+1))
            else
              echo "ℹ️  Already patched: $bg"
            fi
          done

          echo "=== Total files patched: $PATCHED ==="


      - name: Build debug APK
        working-directory: src/android
        run: |
          # Set JAVA_HOME for Buildozer
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          
          # Unset system NDK env vars — buildozer must use its own NDK (r25b)
          # The system NDK r27 has ALooper_pollAll marked unavailable, breaking SDL2
          unset ANDROID_NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_LATEST_HOME
          
          # Add _backend to PYTHONPATH so modules can be found
          export PYTHONPATH="$(pwd)/_backend:$PYTHONPATH"
          
          # Clean the bin directory to force a fresh APK packaging
          rm -rf bin/
          
          # Build — capture exit code properly (tee resets $?)
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
          BUILD_EXIT=$?
          echo "=== Build exit code: $BUILD_EXIT ==="
          
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "⚠️ First build attempt failed. Checking for Kotlin stdlib conflict..."
            if grep -q 'checkDebugDuplicateClasses FAILED\|kotlin-stdlib-jdk[78]' build.log; then
              echo "🔧 Detected Kotlin stdlib duplicate class error. Patching dist build.gradle and retrying..."
              
              # Patch ALL dist build.gradle files
              PATCH_BLOCK=$(printf '\n// --- Kotlin stdlib duplicate class fix (injected by CI) ---\nconfigurations.all {\n    exclude group: '"'"'org.jetbrains.kotlin'"'"', module: '"'"'kotlin-stdlib-jdk7'"'"'\n    exclude group: '"'"'org.jetbrains.kotlin'"'"', module: '"'"'kotlin-stdlib-jdk8'"'"'\n}\n')
              
              for bg in $(find .buildozer -path '*/dists/*/build.gradle' -type f 2>/dev/null); do
                if ! grep -q 'kotlin-stdlib-jdk7' "$bg"; then
                  echo "$PATCH_BLOCK" >> "$bg"
                  echo "✅ Patched: $bg"
                fi
              done
              
              # Also patch the p4a template for future dist recreations
              P4A_TMPL=".buildozer/android/platform/python-for-android/pythonforandroid/bootstraps/sdl2/build/build.gradle"
              if [ -f "$P4A_TMPL" ] && ! grep -q 'kotlin-stdlib-jdk7' "$P4A_TMPL"; then
                echo "$PATCH_BLOCK" >> "$P4A_TMPL"
                echo "✅ Patched p4a template: $P4A_TMPL"
              fi
              
              # Re-run gradle directly from the dist directory
              DIST_DIR=$(find .buildozer -path '*/dists/glossarion' -type d | head -1)
              if [ -n "$DIST_DIR" ] && [ -f "$DIST_DIR/gradlew" ]; then
                echo "🔄 Re-running gradle from: $DIST_DIR"
                cd "$DIST_DIR"
                ./gradlew assembleDebug 2>&1 | tee -a "$OLDPWD/build.log"
                GRADLE_EXIT=$?
                cd "$OLDPWD"
                if [ $GRADLE_EXIT -eq 0 ]; then
                  echo "✅ Gradle retry succeeded!"
                  # Run buildozer again to package the APK properly
                  buildozer android debug 2>&1 | tee -a build.log
                  BUILD_EXIT=$?
                else
                  echo "❌ Gradle retry also failed (exit $GRADLE_EXIT)"
                  tail -100 build.log
                  exit $GRADLE_EXIT
                fi
              else
                echo "❌ Could not find dist directory for retry"
                tail -200 build.log
                exit $BUILD_EXIT
              fi
            else
              echo "❌ Buildozer failed with a non-Kotlin error"
              tail -200 build.log
              exit $BUILD_EXIT
            fi
          fi
      
      - name: Find APK
        id: find_apk
        run: |
          echo "=== Searching for APK files ==="
          # Search everywhere under src/android for .apk files
          echo "--- Recursive search under src/android ---"
          find src/android -name '*.apk' -type f 2>/dev/null || echo "No APK files found under src/android"
          
          # Also check .buildozer output paths
          echo "--- Checking .buildozer paths ---"
          find src/android/.buildozer -name '*.apk' -type f 2>/dev/null || echo "No APK in .buildozer"
          
          # List the bin directory if it exists
          echo "--- Listing src/android/bin/ ---"
          ls -la src/android/bin/ 2>/dev/null || echo "bin/ directory does not exist"
          
          # Find the APK anywhere
          APK_PATH=$(find src/android -name '*.apk' -type f | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "apk_found=true" >> $GITHUB_OUTPUT
            echo "✅ Found APK: $APK_PATH"
            # Copy to a known location for upload
            mkdir -p src/android/bin
            cp "$APK_PATH" src/android/bin/
          else
            echo "apk_found=false" >> $GITHUB_OUTPUT
            echo "❌ No APK found anywhere!"
            # Show last 200 lines of build log for clues
            echo "=== Last 200 lines of build.log ==="
            tail -200 src/android/build.log 2>/dev/null || true
          fi
      
      - name: Upload APK artifact
        if: steps.find_apk.outputs.apk_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Glossarion-Android-APK
          path: src/android/bin/*.apk
          if-no-files-found: warn
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: src/android/build.log
      
      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/') && steps.find_apk.outputs.apk_found == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: src/android/bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Buildozer cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.buildozer
            src/android/.buildozer
          key: buildozer-v5-${{ runner.os }}-${{ hashFiles('src/android/buildozer.spec', '.github/workflows/build-android.yml') }}

