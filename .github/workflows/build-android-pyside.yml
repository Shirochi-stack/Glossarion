name: Build Android PySide APK

on:
  workflow_dispatch:
    inputs:
      pyside_version:
        description: "Host PySide6 version and Android wheel version to use"
        required: true
        default: "6.11.1"
      build_mode:
        description: "debug creates APK, release creates AAB"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
      pyside_android_wheel_url:
        description: "Optional private PySide6 Android wheel URL override. The workflow checks official Qt/PySide artifacts automatically."
        required: false
        default: ""
      shiboken_android_wheel_url:
        description: "Optional private Shiboken6 Android wheel URL override matching the PySide6 wheel."
        required: false
        default: ""

jobs:
  build-android-pyside:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      PYSIDE_VERSION: ${{ inputs.pyside_version }}
      PYSIDE_ANDROID_ARCH: aarch64
      PYSIDE_ANDROID_PYTHON_TAG: cp311
      PYSIDE_ANDROID_WHEEL_URL: ${{ inputs.pyside_android_wheel_url }}
      SHIBOKEN_ANDROID_WHEEL_URL: ${{ inputs.shiboken_android_wheel_url }}
      PYSIDE_BUILD_MODE: ${{ inputs.build_mode }}
      ANDROID_NDK_VERSION: 26.1.10909125
      ANDROID_PLATFORM: android-34
      ANDROID_BUILD_TOOLS: 35.0.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            libltdl-dev \
            cmake \
            curl \
            zip \
            unzip \
            openjdk-17-jdk

      - name: Install Android SDK and NDK packages
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;$ANDROID_PLATFORM" \
            "build-tools;$ANDROID_BUILD_TOOLS" \
            "ndk;$ANDROID_NDK_VERSION"

      - name: Restore PySide Android build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/pip
            ~/.buildozer
            ~/.pyside6-android-deploy
            src/.buildozer
            src/android/pyside_launcher/deployment
          key: pyside-android-v1-${{ runner.os }}-${{ inputs.pyside_version }}-${{ hashFiles('src/android/pyside_launcher/pysidedeploy.spec', 'src/glossarion_android.pyproject', '.github/workflows/build-android-pyside.yml') }}

      - name: Install PySide deploy tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel virtualenv
          python -m pip install "PySide6==$PYSIDE_VERSION"
          ANDROID_REQUIREMENTS="$(python -c 'from pathlib import Path; import PySide6; print(Path(PySide6.__file__).resolve().parent / "scripts" / "requirements-android.txt")')"
          echo "Installing PySide Android deploy requirements from: $ANDROID_REQUIREMENTS"
          python -m pip install -r "$ANDROID_REQUIREMENTS"
          command -v pyside6-android-deploy

      - name: Download PySide Android wheels
        id: android_wheels
        run: |
          set -euo pipefail
          WHEEL_DIR="$GITHUB_WORKSPACE/src/android/pyside_launcher/deployment/android-wheels"
          rm -rf "$WHEEL_DIR"
          mkdir -p "$WHEEL_DIR"

          OFFICIAL_PYSIDE_WHEEL_NAME="pyside6-${PYSIDE_VERSION}-${PYSIDE_VERSION}-${PYSIDE_ANDROID_PYTHON_TAG}-${PYSIDE_ANDROID_PYTHON_TAG}-android_${PYSIDE_ANDROID_ARCH}.whl"
          OFFICIAL_SHIBOKEN_WHEEL_NAME="shiboken6-${PYSIDE_VERSION}-${PYSIDE_VERSION}-${PYSIDE_ANDROID_PYTHON_TAG}-${PYSIDE_ANDROID_PYTHON_TAG}-android_${PYSIDE_ANDROID_ARCH}.whl"

          if [ -n "${PYSIDE_ANDROID_WHEEL_URL:-}" ]; then
            PYSIDE_URL="$PYSIDE_ANDROID_WHEEL_URL"
            PYSIDE_WHEEL_NAME="$(python -c 'import sys, urllib.parse; print(urllib.parse.unquote(urllib.parse.urlparse(sys.argv[1]).path.rsplit("/", 1)[-1]))' "$PYSIDE_URL")"
          else
            PYSIDE_WHEEL_NAME="$OFFICIAL_PYSIDE_WHEEL_NAME"
            PYSIDE_URL="https://download.qt.io/official_releases/QtForPython/pyside6/$PYSIDE_WHEEL_NAME"
          fi

          if [ -n "${SHIBOKEN_ANDROID_WHEEL_URL:-}" ]; then
            SHIBOKEN_URL="$SHIBOKEN_ANDROID_WHEEL_URL"
            SHIBOKEN_WHEEL_NAME="$(python -c 'import sys, urllib.parse; print(urllib.parse.unquote(urllib.parse.urlparse(sys.argv[1]).path.rsplit("/", 1)[-1]))' "$SHIBOKEN_URL")"
          else
            SHIBOKEN_WHEEL_NAME="$OFFICIAL_SHIBOKEN_WHEEL_NAME"
            SHIBOKEN_URL="https://download.qt.io/official_releases/QtForPython/shiboken6/$SHIBOKEN_WHEEL_NAME"
          fi

          PYSIDE_WHEEL="$WHEEL_DIR/$PYSIDE_WHEEL_NAME"
          SHIBOKEN_WHEEL="$WHEEL_DIR/$SHIBOKEN_WHEEL_NAME"

          echo "Downloading PySide Android wheel: $PYSIDE_URL"
          curl --fail --location --retry 5 --retry-delay 10 --retry-all-errors \
            --connect-timeout 30 --max-time 900 \
            --output "$PYSIDE_WHEEL" \
            "$PYSIDE_URL"

          echo "Downloading Shiboken Android wheel: $SHIBOKEN_URL"
          curl --fail --location --retry 5 --retry-delay 10 --retry-all-errors \
            --connect-timeout 30 --max-time 900 \
            --output "$SHIBOKEN_WHEEL" \
            "$SHIBOKEN_URL"

          echo "Downloaded Android wheels:"
          find "$WHEEL_DIR" -type f -name '*.whl' -print | sort

          if [ ! -s "$PYSIDE_WHEEL" ] || [ ! -s "$SHIBOKEN_WHEEL" ]; then
            echo "Could not find downloaded PySide6/Shiboken6 Android wheels in $WHEEL_DIR"
            exit 1
          fi

          echo "pyside_wheel=$PYSIDE_WHEEL" >> "$GITHUB_OUTPUT"
          echo "shiboken_wheel=$SHIBOKEN_WHEEL" >> "$GITHUB_OUTPUT"

      - name: Validate QtWebEngine support in Android wheel
        env:
          PYSIDE_WHEEL: ${{ steps.android_wheels.outputs.pyside_wheel }}
        run: |
          mkdir -p src/android/pyside_launcher
          python - <<'PY'
          import os
          import re
          import sys
          import urllib.error
          import urllib.request
          import zipfile
          from pathlib import Path


          log_lines = []


          def log(message=""):
              print(message)
              log_lines.append(message)


          def write_log():
              Path("src/android/pyside_launcher/android-pyside-build.log").write_text(
                  "\n".join(log_lines) + "\n",
                  encoding="utf-8",
              )


          arch = os.environ["PYSIDE_ANDROID_ARCH"]
          abi_by_arch = {
              "aarch64": "arm64-v8a",
              "x86_64": "x86_64",
          }
          abi = abi_by_arch.get(arch)
          if not abi:
              log(f"::error::Unsupported PySide Android arch for WebEngine validation: {arch}")
              write_log()
              sys.exit(1)

          qt_repo_abi_by_arch = {
              "aarch64": "arm64_v8a",
              "x86_64": "x86_64",
          }
          qt_repo_abi = qt_repo_abi_by_arch[arch]
          version = os.environ["PYSIDE_VERSION"]
          compact_version = version.replace(".", "")
          qt_repo_component = f"qt6_{compact_version}"
          qt_android_metadata_url = (
              "https://download.qt.io/online/qtsdkrepository/all_os/android/"
              f"{qt_repo_component}/{qt_repo_component}_{qt_repo_abi}/Updates.xml"
          )

          wheel = os.environ["PYSIDE_WHEEL"]
          required = [
              f"PySide6/Qt/lib/libQt6WebEngineCore_{abi}.so",
              f"PySide6/Qt/lib/libQt6WebEngineWidgets_{abi}.so",
          ]

          log(f"Checking selected PySide Android wheel: {wheel}")

          with zipfile.ZipFile(wheel) as archive:
              names = set(archive.namelist())

          missing = [name for name in required if name not in names]
          if missing:
              log("Missing QtWebEngine libraries in selected PySide wheel:")
              for name in missing:
                  log(f"  - {name}")

              log("")
              log(f"Checking official Qt Android package metadata: {qt_android_metadata_url}")
              try:
                  with urllib.request.urlopen(qt_android_metadata_url, timeout=60) as response:
                      metadata = response.read().decode("utf-8", errors="replace")
              except urllib.error.HTTPError as exc:
                  log(f"Official Qt Android metadata lookup failed with HTTP {exc.code}.")
                  metadata = ""
              except Exception as exc:
                  log(f"Official Qt Android metadata lookup failed: {exc}")
                  metadata = ""

              if metadata:
                  web_package_names = sorted(set(re.findall(r"<Name>([^<]*web[^<]*)</Name>",
                                                           metadata,
                                                           flags=re.IGNORECASE)))
                  webengine_package_names = [
                      name for name in web_package_names
                      if "webengine" in name.lower()
                  ]
                  if web_package_names:
                      log("Official Qt Android web-related packages found:")
                      for name in web_package_names:
                          log(f"  - {name}")
                  else:
                      log("No official Qt Android web-related packages were found.")

                  if not webengine_package_names:
                      log("")
                      log("Official Qt Android metadata does not publish a qtwebengine Android "
                          f"package for Qt/PySide {version} and ABI {qt_repo_abi}.")

              log("")
              log("::error::Glossarion requires QtWebEngine for this Android PySide build, "
                  "but the selected official PySide Android wheel and the official Qt Android "
                  "repository do not provide QtWebEngine for this target.")
              write_log()
              sys.exit(1)

          log("QtWebEngine libraries found in selected PySide Android wheel.")
          write_log()
          PY

      - name: Generate Android stubs
        run: |
          python src/android/generate_stubs.py

      - name: Patch PySide deploy spec for workflow mode
        working-directory: src/android/pyside_launcher
        run: |
          python - <<'PY'
          from configparser import ConfigParser
          from pathlib import Path
          import os

          spec = Path("pysidedeploy.spec")
          config = ConfigParser(comment_prefixes="/", strict=False, allow_no_value=True)
          config.read(spec)
          config["buildozer"]["mode"] = os.environ["PYSIDE_BUILD_MODE"]
          config["buildozer"]["arch"] = os.environ["PYSIDE_ANDROID_ARCH"]
          with spec.open("w", encoding="utf-8") as handle:
              config.write(handle, space_around_delimiters=True)
          PY
          echo "--- pysidedeploy.spec ---"
          cat pysidedeploy.spec

      - name: Build PySide Android package
        working-directory: src/android/pyside_launcher
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION"

          PYSIDE_WHEEL="${{ steps.android_wheels.outputs.pyside_wheel }}"
          SHIBOKEN_WHEEL="${{ steps.android_wheels.outputs.shiboken_wheel }}"

          if [ ! -f "$PYSIDE_WHEEL" ] || [ ! -f "$SHIBOKEN_WHEEL" ]; then
            echo "Could not find downloaded PySide6/Shiboken6 Android wheels"
            find deployment/android-wheels -type f -name '*.whl' -print || true
            exit 1
          fi

          PYSIDE_WHEEL="$(realpath "$PYSIDE_WHEEL")"
          SHIBOKEN_WHEEL="$(realpath "$SHIBOKEN_WHEEL")"

          echo "Using PySide wheel: $PYSIDE_WHEEL"
          echo "Using Shiboken wheel: $SHIBOKEN_WHEEL"

          set -o pipefail
          pyside6-android-deploy \
            --config-file pysidedeploy.spec \
            --wheel-pyside "$PYSIDE_WHEEL" \
            --wheel-shiboken "$SHIBOKEN_WHEEL" \
            --sdk-path "$ANDROID_HOME" \
            --ndk-path "$ANDROID_NDK_HOME" \
            --force \
            --keep-deployment-files \
            --verbose \
            2>&1 | tee android-pyside-build.log

      - name: Find Android package
        id: find_package
        if: always()
        run: |
          echo "=== Android packages under src ==="
          find src -type f \( -name '*.apk' -o -name '*.aab' \) -print || true

          PACKAGE_PATH="$(find src -type f \( -name '*.apk' -o -name '*.aab' \) | head -1)"
          if [ -n "$PACKAGE_PATH" ]; then
            echo "package_found=true" >> "$GITHUB_OUTPUT"
            echo "package_path=$PACKAGE_PATH" >> "$GITHUB_OUTPUT"
            mkdir -p src/android/pyside_launcher/bin
            cp "$PACKAGE_PATH" src/android/pyside_launcher/bin/
          else
            echo "package_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload PySide Android package
        if: steps.find_package.outputs.package_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Glossarion-Android-PySide-${{ inputs.build_mode }}
          path: src/android/pyside_launcher/bin/*
          if-no-files-found: error

      - name: Upload PySide Android build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-pyside-build-logs
          path: |
            src/android/pyside_launcher/android-pyside-build.log
            src/android/pyside_launcher/.buildozer/**/*.log
            src/.buildozer/**/*.log
          if-no-files-found: warn

      - name: Save PySide Android build cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/pip
            ~/.buildozer
            ~/.pyside6-android-deploy
            src/.buildozer
            src/android/pyside_launcher/deployment
          key: pyside-android-v1-${{ runner.os }}-${{ inputs.pyside_version }}-${{ hashFiles('src/android/pyside_launcher/pysidedeploy.spec', 'src/glossarion_android.pyproject', '.github/workflows/build-android-pyside.yml') }}
