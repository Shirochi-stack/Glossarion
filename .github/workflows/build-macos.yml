name: Build macOS DMG

on:
  workflow_dispatch:  # Manual trigger
  push:
    tags:
      - 'v*'  # Also trigger on version tags

jobs:
  # ARM build on Apple Silicon runner
  build-macos-arm:
    permissions:
      contents: write
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements-macos.txt
      
      - name: Install system dependencies
        run: |
          brew install create-dmg
          brew install pango cairo libffi gdk-pixbuf gobject-introspection
          brew install pkg-config cmake
      
      - name: Build ARM (Apple Silicon)
        run: pyinstaller translator_lite_mac.spec --noconfirm
        working-directory: src
      
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Z_Glossarion-Lite-macOS-ARM
          path: src/dist/*.dmg
          if-no-files-found: error
      
      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: src/dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Intel build on x86_64 runner (for VMware, older Macs, Hackintosh)
  build-macos-intel:
    permissions:
      contents: write
    runs-on: macos-15-intel
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements-macos.txt
      
      - name: Install system dependencies
        run: |
          brew install create-dmg
          brew install pango cairo libffi gdk-pixbuf gobject-introspection
          brew install pkg-config cmake
      
      - name: Build Intel (x86_64)
        run: pyinstaller translator_lite_mac_intel.spec --noconfirm
        working-directory: src
      
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Z_Glossarion-Lite-macOS-Intel
          path: src/dist/*.dmg
          if-no-files-found: error
      
      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: src/dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
